<!DOCTYPE html>
<html>
<head>
    <title>Employee Details</title>
</head>
<body>

<h2>Employee Details</h2>

<form>

    <h3>01. Personal Information</h3>

    <label>Employee Name *</label><br>
    <input type="text" name="first_name" placeholder="First Name">
    <input type="text" name="last_name" placeholder="Last Name"><br><br>

    <label>Starting Date</label><br>
    <input type="date" name="starting_date">

    <label>Birth Date</label><br>
    <input type="date" name="birth_date"><br><br>

    <label>Employee Type</label><br>
    <select name="employee_type">
        <option value="">Select</option>
        <option>Full Time</option>
        <option>Part Time</option>
        <option>Contract</option>
        <option>Intern</option>
    </select><br><br>

    <label>Gender</label><br>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
    <br><br>

    <label>Position</label><br>
    <input type="text" name="position" placeholder="Position">

    <h3>02. Location</h3>

    <label>City</label><br>
    <input type="text" name="city" placeholder="City">

    <label>State</label><br>
    <input type="text" name="state" placeholder="State"><br><br>

    <label>ZIP</label><br>
    <input type="text" name="zip" placeholder="ZIP">

    <label>Address</label><br>
    <textarea name="address" placeholder="Address"></textarea>

    <h3>03. Contact Information</h3>

    <label>Phone</label><br>
    <input type="tel" name="phone" placeholder="Phone">

    <label>Email</label><br>
    <input type="email" name="email" placeholder="Email"><br><br>

    <button type="submit">Register</button>

</form>

</body>
</html>
